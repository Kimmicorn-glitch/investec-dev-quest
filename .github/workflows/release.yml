name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3
          run_install: true

      - name: Build all packages
        run: pnpm build

      - name: Validate levels before release
        run: |
          cp .env.example .env
          pnpm --filter @investec-game/mock-api exec tsx src/index.ts > /tmp/mock-api.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:3001/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/health >/dev/null
          node scripts/validate-levels.mjs
        env:
          GAME_API_BASE_URL: http://localhost:3001
          GAME_API_CLIENT_ID: game_client_id
          GAME_API_CLIENT_SECRET: game_client_secret
          GAME_API_KEY: game_api_key

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
